<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="850" viewBox="0 0 1300 850">
<style>
.box{fill:#f7f7f7;stroke:#222;stroke-width:2;rx:10}
.title{font:700 26px Arial}
.txt{font:16px Arial}
.small{font:13px Arial}
.line{stroke:#222;stroke-width:2;fill:none;marker-end:url(#arrow)}
.power{fill:#fff2cc;stroke:#d6a300;stroke-width:2;rx:10}
.mcu{fill:#d9ead3;stroke:#38761d;stroke-width:2;rx:10}
.io{fill:#d9eaf7;stroke:#1155cc;stroke-width:2;rx:10}
.safe{fill:#f4cccc;stroke:#cc0000;stroke-width:2;rx:10}
</style>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#222"/>
</marker>
</defs>
<text x="40" y="45" class="title">SVC-100 Pro Rev A — Hardware Block Diagram</text>

<rect x="45" y="95" width="190" height="70" class="power"/>
<text x="70" y="125" class="txt">24VDC Input</text>
<text x="70" y="148" class="small">Field power</text>

<rect x="285" y="95" width="220" height="70" class="power"/>
<text x="312" y="125" class="txt">Protection</text>
<text x="312" y="148" class="small">Fuse / TVS / Reverse</text>

<rect x="555" y="95" width="190" height="70" class="power"/>
<text x="590" y="125" class="txt">Buck 5V</text>
<text x="590" y="148" class="small">Relay / peripheral</text>

<rect x="795" y="95" width="190" height="70" class="power"/>
<text x="830" y="125" class="txt">3.3V Regulator</text>
<text x="830" y="148" class="small">MCU / logic</text>

<path d="M235 130 H285" class="line"/>
<path d="M505 130 H555" class="line"/>
<path d="M745 130 H795" class="line"/>

<rect x="500" y="250" width="300" height="160" class="mcu"/>
<text x="575" y="295" class="title" style="font-size:22px">ESP32-S3</text>
<text x="545" y="328" class="txt">WROOM-1-N16R8</text>
<text x="545" y="354" class="small">ESP-IDF / OTA / Web UI</text>
<text x="545" y="378" class="small">Standalone Logic Engine</text>
<path d="M890 165 V250 H735" class="line"/>

<rect x="70" y="250" width="240" height="95" class="io"/>
<text x="105" y="285" class="txt">RS485 Port #1</text>
<text x="105" y="310" class="small">mmWave / Modbus Sensor</text>
<text x="105" y="330" class="small">V+ / GND / A / B</text>

<rect x="70" y="380" width="240" height="95" class="io"/>
<text x="105" y="415" class="txt">RS485 Port #2</text>
<text x="105" y="440" class="small">Energy Meter / Expansion</text>
<text x="105" y="460" class="small">V+ / GND / A / B</text>

<rect x="70" y="510" width="240" height="105" class="io"/>
<text x="105" y="545" class="txt">Digital Input x8</text>
<text x="105" y="570" class="small">Door / Keycard / Leak</text>
<text x="105" y="590" class="small">Dry Contact / mmWave S1/S2</text>

<path d="M310 298 H500" class="line"/>
<path d="M310 428 H500" class="line"/>
<path d="M310 562 H500" class="line"/>

<rect x="980" y="250" width="240" height="120" class="safe"/>
<text x="1030" y="285" class="txt">Relay x4</text>
<text x="1015" y="310" class="small">COM / NO / NC</text>
<text x="1015" y="332" class="small">AC / Light / Fan / Spare</text>
<text x="1015" y="354" class="small">Safe OFF at boot</text>
<path d="M800 310 H980" class="line"/>

<rect x="980" y="410" width="240" height="95" class="io"/>
<text x="1030" y="445" class="txt">Ethernet</text>
<text x="1015" y="470" class="small">LAN8720 or W5500</text>
<text x="1015" y="490" class="small">Decision pending</text>
<path d="M800 456 H980" class="line"/>

<rect x="980" y="545" width="240" height="105" class="io"/>
<text x="1030" y="580" class="txt">USB-C / Debug</text>
<text x="1015" y="605" class="small">Programming / Serial Log</text>
<text x="1015" y="625" class="small">Factory Flash Pads</text>
<path d="M800 598 H980" class="line"/>

<rect x="500" y="520" width="300" height="95" class="io"/>
<text x="560" y="555" class="txt">RTC / LED / Buzzer</text>
<text x="545" y="580" class="small">Installer feedback / status</text>
<path d="M650 410 V520" class="line"/>

<rect x="410" y="700" width="480" height="90" class="safe"/>
<text x="470" y="735" class="txt">Safety Release Gates</text>
<text x="450" y="762" class="small">No unauth relay control • Safe relay boot • OTA rollback • Config sanitization</text>
</svg>
